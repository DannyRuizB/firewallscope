name: lint

# Checks on every push and pull request: ESLint over the first-party client-side
# scripts, then the node:test suite over the parsing/linting/diff/trace logic.
# CDN libraries are declared as globals, not bundled, so they are not linted.
# No host or browser is needed — this only reads and exercises the code.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  eslint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Tests
        run: npm test
