name: lint

# Syntax-checks every first-party JS file on each push and pull request
# (the app is plain client-side scripts; CDN libraries are excluded).
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  syntax:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: JS syntax check
        run: |
          set -e
          find src -name '*.js' -print0 | while IFS= read -r -d '' f; do
            echo "checking $f"
            node --check "$f"
          done
